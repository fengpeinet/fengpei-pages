<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>專屬推廣說明會 - 立即報名</title>
  <meta name="description" content="零成本報名推廣說明會，立刻搶佔名額！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="app-container">

    <header class="hero-section">
      <div class="badge">FREE TICKET</div>
      <h1 class="main-title">掌握未來趨勢<br><span class="highlight-pink">流量爆發</span>說明會</h1>
      <p class="subtitle">限量 0 元報名，額滿即止</p>
      <a href="#form" class="scroll-cta">立即搶位 ↓</a>
    </header>

    <section class="video-section">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/R4f5CSB_vts"
          title="說明會介紹影片"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <section class="image-strip">
      <img src="strips/finalstrips/01.png" alt="">
      <img src="strips/finalstrips/02.png" alt="">
      <img src="strips/finalstrips/03.png" alt="">
      <img src="strips/finalstrips/04.png" alt="">
      <img src="strips/finalstrips/05.png" alt="">
      <img src="strips/finalstrips/06.png" alt="">
      <img src="strips/finalstrips/07.png" alt="">
      <img src="strips/finalstrips/08.png" alt="">
      <img src="strips/finalstrips/09.png" alt="">
    </section>

    <!-- 報名表單區 -->
    <main class="form-section" id="form">
      <div class="form-header">
        <h2>立即卡位報名</h2>
        <p>填寫下方資料，獲取免費入場資格</p>
      </div>

      <form id="registrationForm" class="registration-form">
        <div class="form-group">
          <label for="entryName">姓名 <span class="required">*</span></label>
          <input type="text" id="entryName" name="name" placeholder="請輸入您的真實姓名" required>
        </div>

        <div class="form-group">
          <label for="entryPhone">聯絡電話 <span class="required">*</span></label>
          <input type="tel" id="entryPhone" name="phone" placeholder="0912345678" required>
        </div>

        <div class="form-group">
          <label for="entryEmail">Email <span class="required">*</span></label>
          <input type="email" id="entryEmail" name="email" placeholder="需接收說明會連結" required>
        </div>

        <div class="form-group">
          <label for="entryLineId">LINE ID <span class="optional">(選填)</span></label>
          <input type="text" id="entryLineId" name="lineId" placeholder="方便活動前聯絡">
        </div>

        <div class="form-group">
          <label for="entryReferrer">推薦人 <span class="optional">(選填)</span></label>
          <input type="text" id="entryReferrer" name="referrer" placeholder="推薦您參加的朋友姓名">
        </div>

        <!-- 場次選擇 -->
        <div class="form-group session-group">
          <label>選擇場次 <span class="required">*</span></label>

          <label class="radio-card">
            <input type="radio" name="sessionDate" value="2026/06/16 20:00" required>
            <div class="card-content">
              <span class="session-name">第一場</span>
              <span class="session-time">6/16 (二) 20:00</span>
            </div>
          </label>

          <label class="radio-card">
            <input type="radio" name="sessionDate" value="2026/06/18 14:00">
            <div class="card-content">
              <span class="session-name">第二場</span>
              <span class="session-time">6/18 (四) 14:00</span>
            </div>
          </label>
        </div>

        <button type="submit" id="submitBtn" class="cta-button">
          <span class="btn-text">立即報名</span>
          <span class="btn-loader" style="display: none;">處理中...</span>
        </button>
        <p class="form-footer-note">送出表單代表您同意我們的隱私權政策，並同意接收系統發送之提醒信件。</p>
      </form>

      <!-- 成功訊息區 (預設隱藏) -->
      <div id="successMessage" class="success-message" style="display: none;">
        <div class="success-check">✓</div>
        <h3>報名成功！</h3>
        <p class="success-sub">確認信已寄至您的信箱<br>請記得查收並保存說明會連結</p>
        <div class="success-divider"></div>
        <p class="success-line-hint">加入官方 LINE，掌握最新活動資訊</p>
        <a href="https://line.me/R/ti/p/@fp_media" target="_blank" rel="noopener" class="success-line-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="white">
            <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
          </svg>
          加入好友
        </a>
        <button id="resetBtn" class="success-reset-btn">為其他人報名</button>

        <div class="biz-card">
          <p class="biz-card-label">認識風霈國際傳媒</p>
          <a href="https://www.fpshop.tw/" target="_blank" rel="noopener" class="biz-link">
            <span class="biz-icon">
              <img src="logo-icon.png" alt="風電商">
            </span>
            <span class="biz-link-text">
              <span class="biz-link-title">風電商官網</span>
              <span class="biz-link-sub">fpshop.tw</span>
            </span>
            <span class="biz-link-arrow">→</span>
          </a>
          <a href="https://www.instagram.com/fengpeinet/" target="_blank" rel="noopener" class="biz-link">
            <span class="biz-icon biz-icon--ig">
              <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </span>
            <span class="biz-link-text">
              <span class="biz-link-title">Instagram</span>
              <span class="biz-link-sub">@fengpeinet</span>
            </span>
            <span class="biz-link-arrow">→</span>
          </a>
          <a href="https://www.facebook.com/profile.php?id=61560506886097&locale=zh_TW" target="_blank" rel="noopener" class="biz-link">
            <span class="biz-icon biz-icon--fb">
              <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </span>
            <span class="biz-link-text">
              <span class="biz-link-title">Facebook</span>
              <span class="biz-link-sub">風霈國際傳媒</span>
            </span>
            <span class="biz-link-arrow">→</span>
          </a>
        </div>
      </div>

    </main>

    <footer class="app-footer">
      <div class="watermark">FENGPEINET</div>
    </footer>
  </div>

  <!-- 浮動報名按鈕 -->
  <a href="#form" class="form-float-btn" aria-label="卡位">卡位</a>

  <!-- 浮動 LINE 按鈕 -->
